---
- name: webserver setup
  hosts: webserver
  become: yes
  tasks:
  - name: install httpd
    ansible.builtin.yum:
      name: httpd
      state: present
  - name: Start service
    ansible.builtin.service:
      name: httpd
      state: started
      enabled: yes
- name: DBserver_setup
  hosts: dbserver
  become: yes
  tasks:
  - name: install service mariadb105
    ansible.builtin.dnf:
     name: mariadb105
     state: present
  - name: Start service mariadb105
    ansible.builtin.service:
      name: mariadb
      state: started
      enabled: yes
  - name: Create new database
    mysql_db:
      name: accountd
      state: present
      